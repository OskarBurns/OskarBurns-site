<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oskar Burns</title>
<meta name="description" content="Something is coming. @oskarBurns">
<meta property="og:title" content="Oskar Burns">
<meta property="og:description" content="Something is coming.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Barlow+Condensed:wght@300;400;500;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #060606;
    --card: #111;
    --border: #1e1e1e;
    --border2: #2a2a2a;
    --red: #d93f2e;
    --red2: #b83426;
    --cream: #f0e8d8;
    --tan: #c4b49a;
    --muted: #4a4a4a;
    --muted2: #6a6a6a;
    --white: #f5f2ed;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* GRAIN TEXTURE */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9998;
  }

  /* ── HERO — full viewport ───────────────────────── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    overflow: hidden;
  }

  /* Ambient glow — deep red, barely visible */
  .hero-glow {
    position: absolute;
    bottom: -10%; left: 50%;
    transform: translateX(-50%);
    width: 900px; height: 700px;
    background: radial-gradient(ellipse at center bottom,
      rgba(217,63,46,0.09) 0%,
      rgba(217,63,46,0.03) 40%,
      transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── TOP BAR ─────────────────────────────────────── */
  .topbar {
    position: relative; z-index: 10;
    padding: 32px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeDown 0.8s ease both;
  }

  .topbar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--cream);
    letter-spacing: -0.5px;
    text-decoration: none;
  }
  .topbar-logo em { color: var(--red); font-style: italic; }

  .topbar-right {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── CENTER STAGE ───────────────────────────────── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    position: relative;
    z-index: 2;
  }

  /* eyebrow — barely visible, appears first */
  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 40px;
    animation: fadeUp 1s ease 0.2s both;
  }

  /* Oskar portrait */
  .mascot-wrap {
    position: relative;
    width: min(340px, 70vw);
    margin-bottom: 48px;
    animation: riseUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }

  .mascot-img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 60px 120px rgba(0,0,0,0.95))
            drop-shadow(0 0 40px rgba(217,63,46,0.08));
  }

  /* Headline */
  .hero-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(44px, 7vw, 100px);
    font-weight: 900;
    line-height: 0.88;
    letter-spacing: -3px;
    color: var(--cream);
    margin-bottom: 28px;
    animation: fadeUp 1s ease 0.4s both;
  }
  .hero-headline em {
    font-style: italic;
    color: var(--red);
  }

  /* Subline — vague, intriguing */
  .hero-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 52px;
    animation: fadeUp 1s ease 0.5s both;
  }

  /* Waitlist form */
  .waitlist-form {
    display: flex;
    gap: 0;
    width: min(440px, 90vw);
    animation: fadeUp 1s ease 0.6s both;
  }

  .waitlist-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border2);
    border-right: none;
    padding: 15px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .waitlist-input::placeholder { color: var(--muted); }
  .waitlist-input:focus {
    border-color: var(--red);
    background: rgba(255,255,255,0.06);
  }

  .waitlist-btn {
    background: var(--red);
    color: var(--white);
    border: none;
    padding: 15px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .waitlist-btn:hover { background: var(--red2); }

  .waitlist-success {
    display: none;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--cream);
    animation: fadeUp 0.5s ease both;
  }

  .form-note {
    margin-top: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    animation: fadeUp 1s ease 0.7s both;
  }

  /* ── BOTTOM BAR ──────────────────────────────────── */
  .bottombar {
    position: relative; z-index: 10;
    padding: 28px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    animation: fadeUp 1s ease 0.8s both;
  }

  .social-row {
    display: flex;
    gap: 8px;
  }

  .social-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted2);
    text-decoration: none;
    padding: 8px 14px;
    border: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  .social-pill:hover { color: var(--white); border-color: #3a3a3a; }

  .bottombar-right {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
  }

  /* ── ANIMATIONS ─────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes riseUp {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Subtle idle float */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  .mascot-img { animation: float 7s ease-in-out infinite; }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 700px) {
    .topbar { padding: 24px; }
    .topbar-right { display: none; }
    .bottombar { padding: 20px 24px; flex-direction: column; gap: 16px; text-align: center; }
    .social-row { flex-wrap: wrap; justify-content: center; }
    .hero-headline { font-size: clamp(40px, 12vw, 72px); letter-spacing: -2px; }
    .mascot-wrap { width: min(280px, 65vw); }
  }
</style>
</head>
